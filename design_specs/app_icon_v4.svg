<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Deep Kinetic Background (Dark Mode optimized) -->
    <rect width="512" height="512" rx="112" fill="url(#paint0_radial_bg)"/>

    <!-- Subtle Grid Pattern (Precision & Digital Tech vibe) -->
    <path d="M0 256H512" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="2"/>
    <path d="M256 0V512" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="2"/>

    <!-- The Speed Limit Ring (Glowing Neon Red -> Pink) -->
    <!-- Represents the Limit/Restriction but in a modern way -->
    <circle cx="256" cy="256" r="160" stroke="url(#paint1_linear_ring)" stroke-width="40" stroke-linecap="round"/>

    <!-- The Speed Needle (Electric Cyan) -->
    <!-- Represents current speed, cutting through the limit -->
    <path d="M256 256L360 160" stroke="#4ECCA3" stroke-width="24" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="28" fill="#16213E" stroke="#4ECCA3" stroke-width="8"/>

    <!-- The "Overlay" Glass Effect (Semi-transparent reflection) -->
    <!-- This visualizes the "Overlay" nature of the app -->
    <path d="M0 0H512V200L0 360V0Z" fill="url(#paint2_linear_glass)" fill-opacity="0.15"/>

    <!-- Definitions for Gradients -->
    <defs>
        <!-- Background: Deep Tech Blue/Black -->
        <radialGradient id="paint0_radial_bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(362.039)">
            <stop stop-color="#1A1A2E"/>
            <stop offset="1" stop-color="#0F0F1A"/>
        </radialGradient>

        <!-- Ring: Modern Warning Red (Coral to Magenta) -->
        <linearGradient id="paint1_linear_ring" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF2E63"/>
            <stop offset="1" stop-color="#FF0055"/>
        </linearGradient>

        <!-- Glass Shine: White to Transparent -->
        <linearGradient id="paint2_linear_glass" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="white" stop-opacity="0.4"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
        </linearGradient>
    </defs>
</svg>
